<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

</head>
<body>
    <p id="text" onmouseover="ChangeColor()">click me</p>

    <script>
        function ChangeColor(){
            document.getElementById("text").style.color = "red";

        }
    </script>
</body>
</html>
