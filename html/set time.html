<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <button id="abc">Start</button>
    <p id="xyz">wait !</p>
    <script>
        const xyz = document.getElementById("abc");
        xyz.addEventListener("click",function(){
            setTimeout(ShowMsg,4000);

        });
        function ShowMsg(){
            document.getElementById("xyz").innerHTML = "Hello world";
            

        }
    </script>
</body>
</html>
